<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://moi14212869.github.io/Fenyx/logo2.ico" type="image/x-icon">
  <title>Candidature envoyée - Fenyx Académie</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, Helvetica, sans-serif; }
    body {
      background: linear-gradient(to bottom, #000000, #2a0000, #000000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .box {
      background: linear-gradient(to bottom, #3a0000, #000000);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255,106,0,0.6);
      max-width: 500px;
    }
    h1 {
      color: #ff6a00;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(255,106,0,0.8);
    }
    p { color: #ccc; margin-bottom: 30px; }
    a {
      display: inline-block;
      padding: 12px 25px;
      background: #ff6a00;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    a:hover {
      background: #ff8c00;
      box-shadow: 0 0 15px rgba(255,106,0,0.7);
    }
  </style>
</head>
<body>
<div class="box">
  <h1>✅ Candidature envoyée !</h1>
  <p>Merci pour ta candidature à Fenyx Académie.<br>Nous allons l’analyser et te recontacter prochainement.</p>
  <a href="https://moi14212869.github.io/Fenyx/">Retour au site</a>
</div>
</body>
</html>
